<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reto 5: Panel de Empleados</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <style>
      /* Estilo personalizado para los empleados inactivos */
      .inactivo {
        color: #6c757d;
        text-decoration: line-through;
        background-color: #f8f9fa;
      }
    </style>
  </head>
  <body class="bg-light">
    <div class="container my-5">
      <div class="row mb-4">
        <div class="col">
          <h1 class="display-5 fw-bold text-primary">
            Panel de Control de Empleados
          </h1>
          <p class="text-muted">
            Administra el estado, salarios y nómina de tu equipo de trabajo.
          </p>
        </div>
      </div>

      <div class="row g-3 align-items-center mb-4">
        <div class="col-md-8">
          <div class="d-flex flex-wrap gap-2">
            <button
              id="btn-todos"
              onclick="btnTodo()"
              class="btn btn-outline-primary"
            >
              Mostrar Todos
            </button>
            <button id="btn-activos" class="btn btn-primary">
              Solo Activos
            </button>
            <button id="btn-aumentar" class="btn btn-success">
              <i class="bi bi-graph-up-arrow"></i> Dar Aumento (+10%)
            </button>
          </div>
        </div>

        <div class="col-md-4">
          <div class="card border-primary shadow-sm">
            <div class="card-body py-2 px-3 text-center text-md-end">
              <span class="text-muted small d-block"
                >Gasto Total en Nómina</span
              >
              <h4 class="mb-0 text-primary fw-bold">
                $<span id="total-nomina">0</span>
              </h4>
            </div>
          </div>
        </div>
      </div>

      <div class="card shadow-sm">
        <div class="card-body p-0">
          <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
              <thead class="table-dark">
                <tr>
                  <th scope="col" class="ps-4">Nombre</th>
                  <th scope="col">Departamento</th>
                  <th scope="col">Salario</th>
                  <th scope="col" class="pe-4">Estado</th>
                </tr>
              </thead>
              <tbody id="tabla-empleados"></tbody>
            </table>
          </div>
        </div>
      </div>

      <div class="mt-3 text-end">
        <button id="btn-nomina" class="btn btn-secondary btn-sm">
          Calcular Nómina Total
        </button>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="app.js"></script>
  </body>
</html>
